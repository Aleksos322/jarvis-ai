<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis Voice</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="wrap">
    <div class="card">
        <h1 style="margin:0 0 10px 0; letter-spacing:0.14em;">JARVIS SYSTEM</h1>
        <button id="startBtn">AKTYWUJ</button>
        <div id="status" class="status" style="margin-top:12px;">Oczekiwanie...</div>
    </div>

    <div class="card">
        <div class="label-row">
            <div class="label">Pamięć Jarvisa</div>
            <div class="pill">kontrolowana</div>
        </div>

        <textarea id="memoryInput" class="memory-input" placeholder="Np. Aleks używa Proxmox, Pterodactyl i Ubuntu. Jarvis ma odpowiadać krótko."></textarea>

        <div class="memory-actions">
            <button id="saveMemoryBtn">Zapisz pamięć</button>
            <button id="clearMemoryBtn" class="secondary">Wyczyść pamięć</button>
        </div>

        <pre id="memoryBox" class="memory-box">Brak zapisanych notatek.</pre>
    </div>

    <div class="grid">
        <div class="card">
            <div class="label">Mikrofon</div>
            <canvas id="micCanvas" width="800" height="180"></canvas>
        </div>
        <div class="card">
            <div class="label">Jarvis</div>
            <canvas id="outCanvas" width="800" height="180"></canvas>
        </div>
    </div>
</div>

<script>

// --- ELEMENTY INTERFEJSU (DOM) ---
const startBtn = document.getElementById("startBtn");
const saveMemoryBtn = document.getElementById("saveMemoryBtn");
const clearMemoryBtn = document.getElementById("clearMemoryBtn");
const memoryInput = document.getElementById("memoryInput");
const memoryBox = document.getElementById("memoryBox");
const statusEl = document.getElementById("status");
const micCanvas = document.getElementById("micCanvas");
const outCanvas = document.getElementById("outCanvas");
const micCtx = micCanvas.getContext("2d");
const outCtx = outCanvas.getContext("2d");

// --- ZMIENNE GLOBALNE SYSTEMU ---
let ws = null;              // Połączenie WebSocket
let audioCtx = null;        // Kontekst audio przeglądarki
let micSource = null;       // Źródło z mikrofonu
let micAnalyser = null;     // Analizator fal mikrofonu
let outAnalyser = null;     // Analizator fal Jarvisa
let processor = null;       // Przetwarzanie strumienia audio
let zeroGain = null;        // Wyciszacz (zapobiega zapętleniu dźwięku)
let inputStream = null;     // Strumień z mikrofonu

let playbackSources = [];   // Kolejka fragmentów mowy Jarvisa
let playbackCursor = 0;     // Kursor czasowy dla płynnego łączenia audio

// --- FUNKCJE POMOCNICZE ---

// Aktualizacja statusu tekstowego na ekranie
function setStatus(text) {
    statusEl.textContent = text;
}

// Odświeżanie listy notatek w ramce "Pamięć"
function updateMemoryBox(items) {
    if (!items || !items.length) {
        memoryBox.textContent = "Brak zapisanych notatek.";
        return;
    }
    memoryBox.textContent = items.map((item, index) => `${index + 1}. ${item}`).join("\n");
}

// Wysyłanie danych JSON do serwera
function sendJson(payload) {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(payload));
        return true;
    }
    return false;
}

// Konwersja formatu audio (Float32 -> Int16 PCM)
function float32To16BitPCM(input) {
    const output = new Int16Array(input.length);
    for (let i = 0; i < input.length; i++) {
        let s = Math.max(-1, Math.min(1, input[i]));
        output[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
    return output;
}

// Konwersja bajtów na format Base64 (wymagane przez API)
function base64FromBytes(bytes) {
    let binary = "";
    const chunk = 0x8000;
    for (let i = 0; i < bytes.length; i += chunk) {
        binary += String.fromCharCode(...bytes.subarray(i, i + chunk));
    }
    return btoa(binary);
}

// Zmniejszanie jakości dźwięku (Downsampling) do 16kHz dla serwera
function downsampleBuffer(inputBuffer, inputSampleRate, outputSampleRate) {
    if (outputSampleRate === inputSampleRate) return inputBuffer;
    const sampleRateRatio = inputSampleRate / outputSampleRate;
    const newLength = Math.round(inputBuffer.length / sampleRateRatio);
    const result = new Float32Array(newLength);
    let offsetResult = 0;
    let offsetBuffer = 0;
    while (offsetResult < result.length) {
        const nextOffsetBuffer = Math.round((offsetResult + 1) * sampleRateRatio);
        let accum = 0; let count = 0;
        for (let i = offsetBuffer; i < nextOffsetBuffer && i < inputBuffer.length; i++) {
            accum += inputBuffer[i]; count++;
        }
        result[offsetResult] = count > 0 ? accum / count : inputBuffer[offsetBuffer] || 0;
        offsetResult++;
        offsetBuffer = nextOffsetBuffer;
    }
    return result;
}

// Rysowanie fali dźwiękowej na Canvas
function drawWave(canvasCtx, analyser, color) {
    if (!analyser) return;
    const width = 800;
    const height = 180;
    const bufferLength = analyser.fftSize;
    const dataArray = new Uint8Array(bufferLength);
    analyser.getByteTimeDomainData(dataArray);

    canvasCtx.fillStyle = "#000";
    canvasCtx.fillRect(0, 0, width, height);
    canvasCtx.lineWidth = 2;
    canvasCtx.strokeStyle = color;
    canvasCtx.beginPath();

    const sliceWidth = width / bufferLength;
    let x = 0;
    for (let i = 0; i < bufferLength; i++) {
        const v = dataArray[i] / 128.0;
        const y = (v * height) / 2;
        if (i === 0) canvasCtx.moveTo(x, y);
        else canvasCtx.lineTo(x, y);
        x += sliceWidth;
    }
    canvasCtx.stroke();
}

// Natychmiastowe uciszenie Jarvisa
function stopPlayback() {
    for (const src of playbackSources) {
        try { src.stop(); } catch (e) {}
    }
    playbackSources = [];
    playbackCursor = 0;
}

// --- GŁÓWNA LOGIKA AUDIO (FIXES INCLUDED) ---

// Odtwarzanie dźwięku przychodzącego z serwera
async function playJarvisAudio(arrayBuffer) {
    if (!audioCtx) return;

    const int16 = new Int16Array(arrayBuffer);
    
    // POPRAWKA: Ustawienie 16000Hz zapobiega efektowi przyspieszonego głosu
    const sampleRate = 24000; 
    const buffer = audioCtx.createBuffer(1, int16.length, sampleRate);
    const channel = buffer.getChannelData(0);

    for (let i = 0; i < int16.length; i++) {
        channel[i] = int16[i] / 32768;
    }

    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(outAnalyser);

    // Kolejkowanie fragmentów, by dźwięk był płynny
    const startAt = Math.max(audioCtx.currentTime + 0.05, playbackCursor);
    source.start(startAt);
    playbackCursor = startAt + buffer.duration;

    playbackSources.push(source);
    setStatus("Jarvis mówi...");

    source.onended = () => {
        playbackSources = playbackSources.filter(item => item !== source);
        if (playbackSources.length === 0) {
            setStatus("Gotowy.");
            playbackCursor = audioCtx.currentTime; 
        }
    };
}

// Start systemu, mikrofonu i połączenia
async function start() {
    if (ws && ws.readyState === WebSocket.OPEN) return;

    const protocol = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(`${protocol}//${location.host}/ws`);
    ws.binaryType = "arraybuffer";

    ws.onopen = async () => {
        setStatus("Połączono. Jarvis słucha.");

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        await audioCtx.resume();

        inputStream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, channelCount: 1 }
        });

        micSource = audioCtx.createMediaStreamSource(inputStream);
        micAnalyser = audioCtx.createAnalyser();
        micAnalyser.fftSize = 1024;

        outAnalyser = audioCtx.createAnalyser();
        outAnalyser.fftSize = 1024;
        outAnalyser.connect(audioCtx.destination);

        processor = audioCtx.createScriptProcessor(4096, 1, 1);
        zeroGain = audioCtx.createGain();
        zeroGain.gain.value = 0; // Nie słyszymy własnego echa

        micSource.connect(micAnalyser);
        micSource.connect(processor);
        processor.connect(zeroGain);
        zeroGain.connect(audioCtx.destination);

        // Przetwarzanie mikrofonu w czasie rzeczywistym
        processor.onaudioprocess = (event) => {
            const input = event.inputBuffer.getChannelData(0);

            // Obliczanie głośności (RMS)
            let sum = 0;
            for (let i = 0; i < input.length; i++) { sum += input[i] * input[i]; }
            const rms = Math.sqrt(sum / input.length);

            // POPRAWKA: Próg 0.15 ignoruje drobne szumy (np. upadek długopisu)
            // Jeśli zaczniesz głośno mówić, Jarvis przerwie swoją wypowiedź.
            if (rms > 0.15 && playbackSources.length > 0) {
                stopPlayback();
                setStatus("Przerwano odpowiedź.");
            }

            // Wysyłanie dźwięku do serwera
            const downsampled = downsampleBuffer(input, audioCtx.sampleRate, 16000);
            const pcm = float32To16BitPCM(downsampled);
            const base64 = base64FromBytes(new Uint8Array(pcm.buffer));

            sendJson({ audio: base64, sampleRate: 16000 });
        };

        drawLoop();
    };

    // Obsługa wiadomości z serwera
    ws.onmessage = async (event) => {
        if (typeof event.data === "string") {
            try {
                const msg = JSON.parse(event.data);
                if (msg.type === "memory_state") updateMemoryBox(msg.items);
                if (msg.type === "interrupted") stopPlayback();
                if (msg.type === "user_transcript") console.log("TY:", msg.text);
                if (msg.type === "output_transcript") console.log("JARVIS:", msg.text);
            } catch (e) {}
            return;
        }
        // Jeśli otrzymaliśmy dane binarne, to jest to dźwięk Jarvisa
        let buffer = event.data;
        if (buffer instanceof Blob) buffer = await buffer.arrayBuffer();
        await playJarvisAudio(buffer);
    };

    ws.onclose = () => {
        setStatus("Połączenie zamknięte.");
        stopPlayback();
    };
}

// Pętla animacji wizualizacji
function drawLoop() {
    requestAnimationFrame(drawLoop);
    if (micAnalyser) drawWave(micCtx, micAnalyser, "#00ff88");
    if (outAnalyser) drawWave(outCtx, outAnalyser, "#ffd400");
}

// --- OBSŁUGA PRZYCISKÓW ---

saveMemoryBtn.addEventListener("click", () => {
    const text = memoryInput.value.trim();
    if (text && sendJson({ memory_action: "add", text })) {
        memoryInput.value = "";
        setStatus("Pamięć zapisana.");
    }
});

clearMemoryBtn.addEventListener("click", () => {
    if (sendJson({ memory_action: "clear" })) setStatus("Pamięć wyczyszczona.");
});

startBtn.addEventListener("click", start);
</script>
</body>
</html>
